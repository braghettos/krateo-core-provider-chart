# Default values for core-provider.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

replicaCount: 1

image:
  repository: ghcr.io/braghettos/krateo-core-provider
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

# OpenTelemetry export for the engine (core-provider) AND every spawned cdc. DEFAULT-OFF: with
# enabled=false the deployments emit no OTEL_* env and are byte-identical (no churn). Flip
# enabled=true + set endpoint to the OTLP collector (e.g. http://otel-collector.<ns>.svc:4318)
# to stream metrics+traces to the ClickHouse stack. The installer sets these when observability
# is on. (Logs are always-on structured JSON regardless of this block.)
otel:
  enabled: false
  tracing: true
  endpoint: ""
  protocol: http/protobuf

imagePullSecrets: []
nameOverride: "core-provider"
fullnameOverride: ""

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Automatically mount a ServiceAccount's API credentials?
  automount: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

podAnnotations: {}
podLabels: {}

podSecurityContext: {}
  # fsGroup: 2000

securityContext: {}
  # capabilities:
  #   drop:
  #   - ALL
  # readOnlyRootFilesystem: true
  # runAsNonRoot: true
  # runAsUser: 1000

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: false
  className: ""
  annotations: {}
    # kubernetes.io/ingress.class: nginx
    # kubernetes.io/tls-acme: "true"
  hosts:
    - host: chart-example.local
      paths:
        - path: /
          pathType: ImplementationSpecific
  tls: []
  #  - secretName: chart-example-tls
  #    hosts:
  #      - chart-example.local

resources: {}
  # We usually recommend not to specify default resources and to leave this as a conscious
  # choice for the user. This also increases chances charts run on environments with little
  # resources, such as Minikube. If you do want to specify resources, uncomment the following
  # lines, adjust them as necessary, and remove the curly braces after 'resources:'.
  # limits:
  #   cpu: 100m
  #   memory: 128Mi
  # requests:
  #   cpu: 100m
  #   memory: 128Mi

# livenessProbe:
#   httpGet:
#     path: /
#     port: http
# readinessProbe:
#   httpGet:
#     path: /
#     port: http

autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 100
  targetCPUUtilizationPercentage: 80
  # targetMemoryUtilizationPercentage: 80

# Additional volumes on the output Deployment definition.
volumes: []

# Additional volumeMounts on the output Deployment definition.
volumeMounts: []

nodeSelector: {}

tolerations: []

affinity: {}

env:
  CORE_PROVIDER_DEBUG: "false"

# apiRefRBAC — auto-generate the RBAC that authorizes a CompositionDefinition's apiRef RESTAction
# reads. When enabled, core-provider's pod gets a projected authn-audience token and an authn
# allowlist mapping, and calls snowplow's /rbac (authenticated) to grant the per-composition group
# exactly the reads the RESTAction performs.
#
# Requires the authn serviceaccount login strategy (CRD serviceaccount.authn.krateo.io) to be
# installed; set enabled=false on clusters without it.
apiRefRBAC:
  enabled: true
  snowplowUrl: http://snowplow.krateo-system.svc.cluster.local:8081
  authnUrl: http://authn.krateo-system.svc.cluster.local:8082
  # Namespace where core-provider's authn allowlist mapping is created (where authn watches).
  authnNamespace: krateo-system
  # Group the issued identity belongs to (nominal — /rbac runs under snowplow's own SA).
  group: "krateo:core-provider"
  tokenAudience: authn
  tokenExpirationSeconds: 3600

chartInspector:
  image:
    repository: ghcr.io/braghettos/krateo-chart-inspector
    pullPolicy: IfNotPresent
    tag: 1.0.3
  
  replicaCount: 1
  imagePullSecrets: []
  nameOverride: ""
  fullnameOverride: ""

  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 100
    targetCPUUtilizationPercentage: 80
  serviceAccount:
    # Specifies whether a service account should be created
    create: true
    # Automatically mount a ServiceAccount's API credentials?
    automount: true
    # Annotations to add to the service account
    annotations: {}
    # The name of the service account to use.
    # If not set and create is true, a name is generated using the fullname template
    name: ""

  service:
    type: ClusterIP
    port: 80
  env:
    HOME: /tmp # home should be set to /tmp or any other writable directory to avoid permission issues with helm https://github.com/helm/helm/issues/8038
  # chart-inspector renders the WHOLE umbrella to compute RBAC; core-provider calls it with a
  # ~30s HTTP timeout. On a heavy umbrella (full agent fleet + observability) on a CPU-contended
  # node the render exceeds that timeout ("getting chartinspector: context deadline exceeded"),
  # wedging the install (#56). A guaranteed CPU request keeps the render fast enough; the burst
  # limit covers the heaviest umbrellas. Tune down for tiny single-component installs if needed.
  resources:
    requests:
      cpu: "1"
      memory: 512Mi
    limits:
      cpu: "2"
      memory: 1Gi

cdc:
  image:
    repository: ghcr.io/braghettos/krateo-composition-dynamic-controller
    pullPolicy: IfNotPresent
    tag: 1.2.1
  replicaCount: 1
  imagePullSecrets: []
  nameOverride: ""
  fullnameOverride: ""

  metrics:
    enabled: false
    #port: 8080

  serviceAccount:
    # Specifies whether a service account should be created
    create: true
    # Automatically mount a ServiceAccount's API credentials?
    automount: true
    # Annotations to add to the service account
    annotations: {}
    # The name of the service account to use.
    # If not set and create is true, a name is generated using the fullname template
    name: ""

  podAnnotations: {}
  podLabels: {}

  podSecurityContext: {}
    # fsGroup: 2000

  securityContext: {}
    # capabilities:
    #   drop:
    #   - ALL
    # readOnlyRootFilesystem: true
    # runAsNonRoot: true
    # runAsUser: 1000

  resources: {}

  # livenessProbe:
  #   httpGet:
  #     path: /
  #     port: http
  # readinessProbe:
  #   httpGet:
  #     path: /
  #     port: http

  autoscaling:
    enabled: false
    minReplicas: 1
    maxReplicas: 100
    targetCPUUtilizationPercentage: 80
    # targetMemoryUtilizationPercentage: 80

  # Additional volumes on the output Deployment definition.
  volumes: []

  # Additional volumeMounts on the output Deployment definition.
  volumeMounts: []

  nodeSelector: {}

  tolerations: []

  affinity: {}

  env:
    HOME: /tmp # home should be set to /tmp or any other writable directory to avoid permission issues with helm https://github.com/helm/helm/issues/8038
    COMPOSITION_CONTROLLER_DEBUG: "false"
    COMPOSITION_CONTROLLER_WORKERS: "10"
    # Resync interval for every spawned composition-dynamic-controller (default 3m). The
    # installer's self-bootstrap emits each component's Pass-B CR only once its deps are
    # Ready AND its CRD is discoverable; advancement to the next dependency level happens
    # on the cdc's resync (its RESTMapper re-discovers new CRDs on a cache miss). 60s makes
    # the umbrella self-bootstrap fully hands-off in a few minutes instead of ~3m per level.
    COMPOSITION_CONTROLLER_RESYNC_INTERVAL: "60s"