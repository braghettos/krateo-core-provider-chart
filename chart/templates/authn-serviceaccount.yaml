{{- if .Values.apiRefRBAC.enabled }}
# Authorizes core-provider's OWN ServiceAccount to exchange its projected authn-audience token for
# an authn-issued service JWT, so it can call snowplow's JWT-gated /rbac. This is the same kind of
# allowlist mapping core-provider auto-creates for each CDC when a composition declares an apiRef —
# here, provisioned declaratively for core-provider itself.
#
# Requires the authn serviceaccount login strategy (CRD serviceaccount.authn.krateo.io); disable
# apiRefRBAC.enabled on clusters without it. The inspection runs under snowplow's own identity, so
# the group is nominal — the mapping's existence is what authorizes the token exchange.
apiVersion: serviceaccount.authn.krateo.io/v1alpha1
kind: ServiceAccount
metadata:
  name: {{ include "core-provider.fullname" . }}
  namespace: {{ .Values.apiRefRBAC.authnNamespace }}
  labels:
    {{- include "core-provider.labels" . | nindent 4 }}
spec:
  serviceAccountRef:
    namespace: {{ .Release.Namespace }}
    name: {{ include "core-provider.serviceAccountName" . }}
  groups:
    - {{ .Values.apiRefRBAC.group | quote }}
  displayName: "core-provider (RESTAction RBAC inspector)"
{{- end }}
