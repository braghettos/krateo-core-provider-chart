apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{`{{ .resource }}`}}-{{`{{ .apiVersion }}`}}
rules:
- apiGroups: ["apiextensions.k8s.io"]
  resources: ["customresourcedefinitions"]
  # watch added for cdc >= 1.0.3: the controller watches CRD events to auto-invalidate its
  # discovery cache (krateo-composition-dynamic-controller#2), removing the manual-restart nudge.
  verbs: ["get", "list", "watch"]
- apiGroups: ["composition.krateo.io"]
  resources: ["*"]
  verbs: ["*"]
- apiGroups: ["rbac.authorization.k8s.io"]
  resources: ["roles", "rolebindings", "clusterroles", "clusterrolebindings"]
  verbs: ["*"]
- apiGroups: [""]
  resources: ["namespaces"]
  verbs: ["get", "list", "watch", "create", "update", "patch"]
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get", "list", "create", "delete", "update"]
- apiGroups: ["core.krateo.io"]
  resources: ["compositiondefinitions", "compositiondefinitions/status"]
  verbs: ["get", "list", "watch"]
- apiGroups: ["events.k8s.io"]
  resources: ["events"]
  verbs: ["create", "patch", "update"]
- apiGroups: [""]
  resources: ["events"]
  verbs: ["create", "patch", "update"]