apiVersion: kagent.dev/v1alpha2
kind: Agent
metadata:
  name: krateo-core-provider-agent
  namespace: {{ .Values.namespace }}
  labels:
    app.kubernetes.io/name: krateo-core-provider-agent
    app.kubernetes.io/part-of: krateo-core-provider
spec:
  type: Declarative
  description: >-
    The Krateo blueprints/composition-engine expert: manages CompositionDefinitions, compositions and the marketplace. Knows braghettos/krateo-core-provider + braghettos/krateo-core-provider-chart.
  declarative:
    deployment:
      env:
{{- include "core-provider-agent.genaiEnv" . | nindent 8 }}
    modelConfig: {{ .Values.modelConfig.name }}
    stream: true
    promptTemplate:
      dataSources:
        - kind: ConfigMap
          name: core-provider-agent-prompts-{{ .Values.prompts.language }}
          alias: prompts
    systemMessage: |
      {{`{{include "prompts/core_provider_agent"}}`}}
    tools:
      - type: McpServer
        mcpServer:
          name: kagent-tool-server
          kind: RemoteMCPServer
          apiGroup: kagent.dev
          toolNames:
            - k8s_get_resources
            - k8s_get_resource_yaml
            - k8s_apply_manifest
{{- if .Values.fetch.enabled }}
      # Tokenless doc grounding: GET the version-pinned raw docs/llms.txt URL (public, no auth/token).
      - type: McpServer
        mcpServer:
          name: {{ .Values.fetch.mcpServer }}
          kind: MCPServer
          apiGroup: kagent.dev
          toolNames:
            - fetch
{{- end }}
{{- if .Values.github.enabled }}
      - type: McpServer
        mcpServer:
          name: {{ .Values.github.mcpServer }}
          kind: RemoteMCPServer
          apiGroup: kagent.dev
          toolNames:
            - get_file_contents
            - search_repositories
            - create_or_update_file
            - push_files
{{- end }}
    a2aConfig:
      skills:
        - id: blueprints
          name: Manage blueprints & compositions
          description: Create/inspect CompositionDefinitions and Compositions, browse the marketplace, grounded in the core-provider source.
          tags: [krateo, blueprint, composition, core-provider]
          examples:
            - What is a CompositionDefinition and how do I create one?
            - List the available blueprints in the marketplace.
    deployment:
      resources:
{{- toYaml .Values.resources | nindent 8 }}
